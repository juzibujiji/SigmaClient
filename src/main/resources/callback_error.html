<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma - Login failed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #3d1e12 0%, #16100a 70%);
            color: #f6ece8;
        }
        .card {
            text-align: center;
            padding: 48px 56px;
            border-radius: 18px;
            background: rgba(64, 30, 18, 0.35);
            border: 1px solid rgba(230, 120, 90, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            max-width: 440px;
            animation: rise 0.5s ease-out both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .badge {
            width: 76px;
            height: 76px;
            margin: 0 auto 26px;
            border-radius: 50%;
            background: rgba(230, 120, 90, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .badge svg { width: 38px; height: 38px; stroke: #e6785a; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.2px; }
        p { font-size: 14.5px; line-height: 1.55; color: #d0a79c; }
        .reason {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            font-size: 13px;
            color: #e6a08a;
            word-break: break-word;
        }
        .hint { margin-top: 22px; font-size: 12.5px; color: #9c7264; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 8v5"></path>
                <path d="M12 16.5v.01"></path>
                <circle cx="12" cy="12" r="9"></circle>
            </svg>
        </div>
        <h1>Login didn't complete</h1>
        <p>Sigma couldn't finish signing you in. You can close this tab and try again from the client.</p>
        <div class="reason">%ERROR%</div>
        <div class="hint">If this keeps happening, Microsoft's login service may be temporarily unavailable.</div>
    </div>
</body>
</html>
